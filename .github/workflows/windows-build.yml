name: Windows Rust Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Enable long paths (Windows fix)
        run: git config --system core.longpaths true

      - name: Shorten cargo paths
        run: |
          echo "CARGO_HOME=C:\.cargo" >> $env:GITHUB_ENV
          echo "CARGO_TARGET_DIR=C:\target" >> $env:GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust
        run: |
          rustc -vV
          cargo -vV

      - name: Configure cargo (git fix)
        run: |
          mkdir C:\.cargo -Force
          echo "[net]" >> C:\.cargo\config.toml
          echo "git-fetch-with-cli = true" >> C:\.cargo\config.toml
          echo "[http]" >> C:\.cargo\config.toml
          echo "multiplexing = false" >> C:\.cargo\config.toml

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            C:\.cargo\registry
            C:\.cargo\git
            C:\target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Clone Gram repo
        run: git clone --depth=1 https://codeberg.org/GramEditor/gram

      - name: Build (Release)
        run: |
          cd gram
          cargo build --release --bins

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gram-windows
          path: C:\target\release\
