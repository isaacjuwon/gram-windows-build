name: Windows Rust Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust
        run: |
          rustc -vV
          cargo -vV

      # ✅ FIX: configure cargo BEFORE build
      - name: Configure cargo
        run: |
          mkdir $env:USERPROFILE\.cargo -Force
          echo "[net]" >> $env:USERPROFILE\.cargo\config.toml
          echo "git-fetch-with-cli = true" >> $env:USERPROFILE\.cargo\config.toml

      - name: Clone Gram repo
        run: git clone --depth=1 https://codeberg.org/GramEditor/gram

      - name: Build (Release)
        run: |
          cd gram
          cargo build --release
